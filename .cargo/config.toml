# Vibe Coded OS — Build Configuration

[build]
target = "x86_64-unknown-none"
rustflags = ["-C", "link-arg=-Tkernel/linker.ld", "-C", "relocation-model=static"]

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true
opt-level = 3
