name: Daily Build

on:
  # Run every day at 06:00 UTC.
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Limine binaries
        uses: actions/cache@v4
        with:
          path: tools/limine-cache
          key: limine-12.3.3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf xorriso util-linux

      - name: Build x86_64 kernel and boot images
        run: ./build.sh x86_64

      - name: Create hybrid BIOS+UEFI ISO
        run: ./build-iso.sh

      - name: Boot test x86_64 ISO in QEMU/OVMF
        run: |
          cp /usr/share/OVMF/OVMF_VARS.fd /tmp/ovmf_vars.fd
          timeout 30s qemu-system-x86_64 \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -drive if=pflash,format=raw,file=/tmp/ovmf_vars.fd \
            -cdrom target/aperture.iso \
            -m 512 -smp 1 -serial stdio -display none \
            2>&1 | tee /tmp/qemu-boot.log || true
          if grep -q "Aperture OS x86_64 kernel booting" /tmp/qemu-boot.log; then
            echo "UEFI boot test passed"
          else
            echo "UEFI boot test failed; kernel did not reach serial output"
            cat /tmp/qemu-boot.log
            exit 1
          fi

      - name: Run host tests
        run: cargo test -p x86-decode -p pe-parser -p aarch64-decode

      - name: Upload x86_64 boot images
        uses: actions/upload-artifact@v4
        with:
          name: aperture-os-x86_64-boot-images
          path: |
            target/aperture-uefi.img
            target/aperture-bios.img
          if-no-files-found: error

      - name: Upload x86_64 ISO
        uses: actions/upload-artifact@v4
        with:
          name: aperture-os-x86_64-iso
          path: target/aperture.iso
          if-no-files-found: error

  build-aarch64:
    name: Build AArch64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Limine binaries
        uses: actions/cache@v4
        with:
          path: tools/limine-cache
          key: limine-12.3.3

      - name: Install AArch64 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu xorriso

      - name: Build AArch64 kernel and boot image
        run: ARCH=aarch64 ./build.sh

      - name: Run host tests
        run: cargo test -p x86-decode -p pe-parser -p aarch64-decode

      - name: Upload AArch64 kernel ELF
        uses: actions/upload-artifact@v4
        with:
          name: aperture-os-aarch64-kernel-elf
          path: target/aarch64-unknown-none/debug/kernel
          if-no-files-found: error

      - name: Upload AArch64 boot image
        uses: actions/upload-artifact@v4
        with:
          name: aperture-os-aarch64-boot-image
          path: target/aperture-aarch64.iso
          if-no-files-found: error

  release:
    name: Create nightly release
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-aarch64]
    if: github.event_name != 'pull_request'
    steps:
      - name: Download x86_64 ISO
        uses: actions/download-artifact@v4
        with:
          name: aperture-os-x86_64-iso
          path: release/

      - name: Download AArch64 kernel ELF
        uses: actions/download-artifact@v4
        with:
          name: aperture-os-aarch64-kernel-elf
          path: release/

      - name: Download AArch64 boot image
        uses: actions/download-artifact@v4
        with:
          name: aperture-os-aarch64-boot-image
          path: release/

      - name: Compute nightly timestamp
        id: ts
        run: |
          RELEASE_TS="$(date -u +%Y-%m-%d-%H%M%S)"
          echo "ts=${RELEASE_TS}" >> "$GITHUB_OUTPUT"

      - name: Rename assets with timestamp
        run: |
          mv release/aperture.iso "release/aperture-os-x86_64-${RELEASE_TS}.iso"
          mv release/kernel "release/aperture-os-aarch64-${RELEASE_TS}.elf"
          mv release/aperture-aarch64.iso "release/aperture-os-aarch64-${RELEASE_TS}.iso"
        env:
          RELEASE_TS: ${{ steps.ts.outputs.ts }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.ts.outputs.ts }}
          name: Aperture OS nightly ${{ steps.ts.outputs.ts }}
          body: |
            Automated daily build of Aperture OS.

            Assets:
            - `aperture-os-x86_64-${{ steps.ts.outputs.ts }}.iso` — hybrid BIOS+UEFI bootable ISO
            - `aperture-os-aarch64-${{ steps.ts.outputs.ts }}.iso` — AArch64 UEFI bootable ISO
            - `aperture-os-aarch64-${{ steps.ts.outputs.ts }}.elf` — AArch64 kernel ELF
          files: release/*
          prerelease: true
