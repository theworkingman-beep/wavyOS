name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumping from ${CURRENT_VERSION} to v${NEW_VERSION}"

      - name: Update version in Cargo.toml
        run: |
          NEW_VER=${{ steps.version.outputs.new_version }}
          sed -i "s/^version = \".*\"/version = \"${NEW_VER}\"/" Cargo.toml
          echo "Updated Cargo.toml to version ${NEW_VER}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git push

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: ${{ matrix.arch == 'x86_64' && 'x86_64-unknown-none,x86_64-unknown-uefi' || 'aarch64-unknown-none,aarch64-unknown-uefi' }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-arm grub-efi-amd64-bin mtools xorriso

      - name: Build ${{ matrix.arch }}
        run: |
          export TARGET_ARCH=${{ matrix.arch }}
          export VERSION=${{ needs.bump-version.outputs.new_version }}
          ./scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-os-${{ matrix.arch }}-${{ needs.bump-version.outputs.new_version }}
          path: |
            build/vibe-os-${{ matrix.arch }}-${{ needs.bump-version.outputs.new_version }}.iso
            build/vibe-os-${{ matrix.arch }}-${{ needs.bump-version.outputs.new_version }}.img
          retention-days: 1

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibe-os-x86_64-${{ needs.bump-version.outputs.new_version }}
          path: build/

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: vibe-os-aarch64-${{ needs.bump-version.outputs.new_version }}
          path: build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: "VibeOS ${{ needs.bump-version.outputs.new_version }}"
          body: |
            ## VibeOS ${{ needs.bump-version.outputs.new_version }}

            Automatic release from push to main.

            ### Artifacts
            - `vibe-os-x86_64.iso` — x86_64 bootable ISO (UEFI)
            - `vibe-os-x86_64.img` — x86_64 FAT disk image
            - `vibe-os-aarch64.iso` — aarch64 bootable ISO (UEFI)
            - `vibe-os-aarch64.img` — aarch64 FAT disk image

            ### Boot
            ```bash
            # x86_64
            qemu-system-x86_64 -machine q35 -m 512M \
              -drive if=pflash,format=raw,unit=0,file=/usr/share/OVMF/OVMF_CODE_4M.fd,readonly=on \
              -drive if=pflash,format=raw,unit=1,file=OVMF_VARS_4M.fd \
              -drive format=raw,file=vibe-os-x86_64.iso

            # aarch64
            qemu-system-aarch64 -machine virt -cpu cortex-a72 -m 512M \
              -drive if=pflash,format=raw,unit=0,file=/usr/share/AAVMF/AAVMF_CODE.fd,readonly=on \
              -drive if=pflash,format=raw,unit=1,file=AAVMF_VARS.fd \
              -drive format=raw,file=vibe-os-aarch64.iso
            ```
          files: |
            build/vibe-os-x86_64-${{ needs.bump-version.outputs.new_version }}.iso
            build/vibe-os-x86_64-${{ needs.bump-version.outputs.new_version }}.img
            build/vibe-os-aarch64-${{ needs.bump-version.outputs.new_version }}.iso
            build/vibe-os-aarch64-${{ needs.bump-version.outputs.new_version }}.img
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
